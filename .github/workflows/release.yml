name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  creator:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: creator-app/package-lock.json

      - name: Build desktop release artifacts
        run: ./build-creator.sh

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creator-release
          path: |
            prebuilts/WhitelistBypass Creator-*.dmg
            prebuilts/WhitelistBypass Creator-*.dmg.blockmap
            prebuilts/WhitelistBypass Creator-*.exe
            prebuilts/WhitelistBypass Creator-*.AppImage

  android:
    runs-on: macos-14
    env:
      ANDROID_HOME: /opt/homebrew/share/android-commandlinetools
      ANDROID_SDK_ROOT: /opt/homebrew/share/android-commandlinetools
      JAVA_HOME: /opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android command line tools
        run: |
          brew install openjdk@17
          brew install --cask android-commandlinetools

      - name: Install Android SDK packages
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses >/dev/null
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865"

      - name: Install gomobile
        run: |
          export PATH="$HOME/go/bin:/opt/homebrew/opt/openjdk@17/bin:/opt/homebrew/bin:$PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Android release artifacts
        run: |
          export PATH="$HOME/go/bin:/opt/homebrew/opt/openjdk@17/bin:/opt/homebrew/bin:$PATH"
          ./build-app.sh

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: prebuilts/whitelist-bypass.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - creator
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download creator artifacts
        uses: actions/download-artifact@v8
        with:
          name: creator-release
          path: prebuilts

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release
          path: prebuilts

      - name: Create checksums
        run: |
          cd prebuilts
          find . -maxdepth 1 -type f \
            \( -name 'WhitelistBypass Creator-*' -o -name 'whitelist-bypass.apk' \) \
            -print | LC_ALL=C sort | while IFS= read -r file; do
              shasum -a 256 "$file"
            done > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            prebuilts/*
